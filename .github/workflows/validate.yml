name: Validate dataset

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Validate scenarios
        run: python -m src.validate_scenarios --allow-placeholders
      - name: Unit tests
        run: pytest -q
      - name: Score committed live results
        run: python -m src.score --run results/latest
